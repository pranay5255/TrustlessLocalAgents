<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>x402 Agent Deployer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f7;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #1a1a1a;
            margin-bottom: 20px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }
        button {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #0070f3;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #0051a2;
        }
        #output {
            margin-top: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 6px;
            white-space: pre-wrap;
            font-family: monospace;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Deploy x402 Agent</h1>
        <form id="deployForm">
            <div class="form-group">
                <label for="agentName">Agent Name</label>
                <input type="text" id="agentName" name="agentName" required placeholder="e.g., My Helpful Agent">
            </div>
            <div class="form-group">
                <label for="agentDescription">Description</label>
                <textarea id="agentDescription" name="agentDescription" rows="3" required placeholder="What does your agent do?"></textarea>
            </div>
            <div class="form-group">
                <label for="agentWallet">Wallet Address (Base)</label>
                <input type="text" id="agentWallet" name="agentWallet" required placeholder="0x...">
            </div>
            <div class="form-group">
                <label for="openRouterKey">OpenRouter API Key</label>
                <input type="password" id="openRouterKey" name="openRouterKey" required>
            </div>
            <button type="submit">Deploy Agent</button>
        </form>
        <div id="output"></div>
    </div>

    <script>
        document.getElementById('deployForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const outputDiv = document.getElementById('output');
            outputDiv.style.display = 'block';
            outputDiv.textContent = 'Deploying agent...';

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch('/api/deploy', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data),
                });
                
                const result = await response.json();
                outputDiv.textContent = JSON.stringify(result, null, 2);
            } catch (error) {
                outputDiv.textContent = 'Error: ' + error.message;
            }
        });
    </script>
</body>
</html>
